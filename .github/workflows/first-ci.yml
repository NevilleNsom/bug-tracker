name: CI

on: 
  push:
    branches: 
      - main
  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  backend-unit-tests:

    runs-on: ubuntu-latest
    outputs: 
      coverage: ${{steps.test-backend.outputs.report}}
    steps:

      - uses: actions/checkout@v4

      - name: setup GO
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"
          cache-dependency-path: bugtracker-backend/go.sum
      
      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest


      - name: Execute backend unit tests
        id: test-backend
        working-directory: ./bugtracker-backend
        run: |

          go test -json -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out > coverage.txt

          # echo"## Go Test Backend Coverage Report" >> $GITHUB_STEP_SUMMARY
          # echo '```' >> $GITHUB_STEP_SUMMARY
          # cat coverage.txt >> $GITHUB_STEP_SUMMARY
          # echo '```' >> $GITHUB_STEP_SUMMARY

          # echo "report<<EOF" >> $GITHUB_OUTPUT
          # cat coverage.txt >> 
          # echo "EOF" >> $GITHUB_OUTPUT

          go test -v ./...  2>&1 | go-junit-report > tests-results.xml

      # - name: Publish backend test results
      #   uses: dorny/test-reporter@v1
      #   if: always()
      #   with:
      #    name: Backend unit test reports
      #    path: bugtracker-backend/tests-results.xml
      #    reporter: jest-junit

  frontend-unit-tests:
    # needs: backend-unit-tests
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{steps.test-frontend.outputs.report}}
    # env: 
    #   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps: 

      - uses: actions/checkout@v4

      - name: set up Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: '20'
          cache: npm
          cache-dependency-path: bugtracker-frontend/package-lock.json

      - name: Execute front end unit tests
        id: test-frontend
        working-directory: ./bugtracker-frontend
        run: |
          npm ci
          npm test | tee full_output.txt

          # echo"## Frontend Coverage Report" >> $GITHUB_STEP_SUMMARY
          # echo '```' >> $GITHUB_STEP_SUMMARY
          # cat full_output.txt >> $GITHUB_STEP_SUMMARY
          # echo '```' >> $GITHUB_STEP_SUMMARY
          
          # echo "report<<EOF" >> $GITHUB_OUTPUT
          # cat full_output.txt >> 
          # echo "EOF" >> $GITHUB_OUTPUT


      # - name: Publish Frontend Test Results
      #   uses: dorny/test-reporter@v1
      #   if: always()
      #   with: 
      #     name: Front end unit test report
      #     path: bugtracker-frontend/test-results.xml
      #     reporter: jest-junit

  create-coverage-comment: 
    if: github.event_name == 'pull_request'
    needs: [backend-unit-tests , frontend-unit-tests]
    runs-on: ubuntu-latest
    permissions: 
      pull-requests: write
    steps: 
      - name: Backend coverage report
        uses: peter-evans/create-or-update-comment@v4
        with: 
          issue-number: ${{github.event.pull_request.number}}
          body: |
           ## backend test coverage report comments
           ```
           ${{needs.backend-unit-tests.outputs.coverage}}
           ```
      - name: Frontend coverage report
        uses: peter-evans/create-or-update-comment@v4
        with: 
          issue-number: ${{github.event.pull_request.number}}
          body: |
           ## frontend test coverage comments
           ```
           ${{needs.frontend-unit-tests.outputs.coverage}}
           ```


  run-api-tests:
    needs: [frontend-unit-tests, backend-unit-tests] 
    runs-on: ubuntu latest

    steps: 
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Launch application
        run:   |
         docker compose up --build -d
         npx wait-port http://localhost:8080/api/health -t 30000

      - name: Run API tests
        working-directory: ./tests-api
        run:   |
          npm ci
          npx playwright test

      - name: Shut down application
        run: docker compose down

      - name: Upload Test results
        if: always()
        uses: actions/upload-artifact@v4
        with: 
          name: api tests results
          path: ./tests-api/test-results/
          retention-days: 30 #how long it will be available for download on github

      - name: Upload Playwright Test report
        if: always()
        uses: actions/upload-artifact@v4
        with: 
          name: api playwright tests results
          path: ./tests-api/playwright-report/
          retention-days: 30

      - name: Publish Playwright Test report
        if: always()
        uses: dorny/test-reporter@v1
        with: 
          name: API test report
          path: ./tests-api/playwright-report/*.xml
          reporter: jest-junit
          



      