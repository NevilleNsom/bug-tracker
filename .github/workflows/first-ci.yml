name: CI

on: 
  push:
    branches: 
      - main

  workflow_dispatch:

jobs:
  backend-unit-tests:

    runs-on: ubuntu-latest
    
    steps:

      - uses: actions/checkout@v4

      - name: setup GO
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"
          cache-dependency-path: bugtracker-backend/go.sum

      - name: Execute backend unit tests
        working-directory: ./bugtracker-backend
        run: |
          go test -v ./...

  frontend-unit-tests:
    needs: backend-unit-tests
    runs-on: ubuntu-latest
    # env: 
    #   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps: 

      - uses: actions/checkout@v4

      - name: set up Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: '20'
          cache: npm
          cache-dependency-path: bugtracker-frontend/package-lock.json

      - name: Execute front end unit tests
        working-directory: ./bugtracker-frontend
        run: |
          npm ci
          npm test
      - name: Publish Frontend Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with: 
          name: Front end unit test report
          path: bugtracker-frontend/test-results.xml
          reporter: jest-junit


  
